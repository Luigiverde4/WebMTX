<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Streaming - TFG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        h1 {
            margin-bottom: 40px;
            font-size: 2.5rem;
            text-align: center;
        }
        .tools-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 800px;
            padding: 20px;
        }
        .tool-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: transform 0.3s, background 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tool-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
        }
        .tool-card h2 {
            font-size: 1.3rem;
            margin-bottom: 10px;
        }
        .tool-card p {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        footer {
            margin-top: 40px;
            opacity: 0.6;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <h1>🎥 WebRTC Streaming Tools</h1>
    
    <div class="tools-container">
        <a href="broadcaster.html" class="tool-card">
            <div class="icon">📡</div>
            <h2>Broadcaster</h2>
            <p>Emitir stream de video</p>
        </a>
        
        <a href="player.html" class="tool-card">
            <div class="icon">▶️</div>
            <h2>Player</h2>
            <p>Reproducir streams</p>
        </a>
        
        <a href="playback.html" class="tool-card">
            <div class="icon">🔄</div>
            <h2>Playback</h2>
            <p>Reproducción de grabaciones</p>
        </a>
        
        <a href="api.html" class="tool-card">
            <div class="icon">⚙️</div>
            <h2>API Control</h2>
            <p>Control y configuración</p>
        </a>
    </div>
    
    <footer>
        TFG - Streaming de baja latencia con WebRTC
    </footer>
</body>
</html>
